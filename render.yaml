services:
  # Web Service (API Backend)
  - type: web
    name: campus-navigator-api
    runtime: docker
    plan: free # Change to 'starter' or higher for production
    region: oregon # Choose closest region to your users
    branch: main # Git branch to deploy

    # Health check endpoint
    healthCheckPath: /api/health

    # Environment variables
    envVars:
      - key: APP_NAME
        value: Campus Navigator API

      - key: APP_ENV
        value: production

      - key: APP_DEBUG
        value: false

      - key: APP_KEY
        generateValue: true # Render will generate this

      - key: APP_URL
        value: https://campus-navigator-api.onrender.com # Update with your actual URL

      - key: LOG_CHANNEL
        value: stdout

      - key: LOG_LEVEL
        value: error

      - key: DB_CONNECTION
        value: mysql # or pgsql

      # Link these to your Render database
      - key: DB_HOST
        fromDatabase:
          name: campus-navigator-db
          property: host

      - key: DB_PORT
        fromDatabase:
          name: campus-navigator-db
          property: port

      - key: DB_DATABASE
        fromDatabase:
          name: campus-navigator-db
          property: database

      - key: DB_USERNAME
        fromDatabase:
          name: campus-navigator-db
          property: user

      - key: DB_PASSWORD
        fromDatabase:
          name: campus-navigator-db
          property: password

      - key: CACHE_STORE
        value: redis

      - key: QUEUE_CONNECTION
        value: redis

      - key: SESSION_DRIVER
        value: redis

      # Link to Render Redis
      - key: REDIS_HOST
        fromService:
          name: campus-navigator-redis
          type: redis
          property: host

      - key: REDIS_PASSWORD
        fromService:
          name: campus-navigator-redis
          type: redis
          property: password

      - key: REDIS_PORT
        value: 6379

      # JWT Configuration
      - key: JWT_SECRET
        generateValue: true

      - key: JWT_TTL
        value: 60

      # Firebase - Add your credentials as secret files or env vars
      - key: FIREBASE_CREDENTIALS
        sync: false # Set manually in dashboard

      # Optional: Run migrations on deploy
      - key: RUN_MIGRATIONS
        value: true

      # CORS settings
      - key: SANCTUM_STATEFUL_DOMAINS
        value: localhost,127.0.0.1

      - key: SESSION_DOMAIN
        value: .onrender.com

# Optional: Database (uncomment if you want Render-managed database)
# databases:
#   - name: campus-navigator-db
#     databaseName: campus_navigator
#     plan: free # or starter for production

# Optional: Redis (uncomment if you want Render-managed Redis)
# - type: redis
#   name: campus-navigator-redis
#   plan: free
#   maxmemoryPolicy: allkeys-lru
